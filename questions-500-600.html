<!DOCTYPE html>

<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --surface: #1a1d27;
      --card: #21242f;
      --border: #2e3244;
      --accent: #ff9900;
      --accent-dim: rgba(255,153,0,0.12);

      --muted: #8a8fa8;
      --correct: #22c55e;

    }

    body {

      color: var(--text);

    }

    header {

      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-meta {

      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .score-badge {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(255,153,0,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-weight: 600;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 32px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .controls-left {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }

    select, input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 8px 12px;

      cursor: pointer;
    }

      border-color: var(--accent);
    }

    input[type="number"] { width: 80px; }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: var(--wrong-dim);
      color: var(--wrong);
      border: 1px solid rgba(239,68,68,0.3);
    }

      background: var(--border);

      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {

      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s;
    }

    .page-info {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .question-card {

      padding: 32px;
      margin-bottom: 24px;

    .q-header {

      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;

      color: var(--text);

      margin-top: 36px;

      background: var(--surface);

const questionShuffles = {};
const LETTERS = ['A', 'B', 'C', 'D', 'E'];

function getShuffled(q) {
  if (!questionShuffles[q.num]) {
    const shuffled = [...q.options].sort(() => Math.random() - 0.5);
    const options = shuffled.map((opt, i) => ({
      displayLetter: LETTERS[i],
      origLetter: opt.letter,
      text: opt.text
    }));
    const origToDisplay = {}, displayToOrig = {};
    options.forEach(o => {
      origToDisplay[o.origLetter] = o.displayLetter;
      displayToOrig[o.displayLetter] = o.origLetter;
    });
    questionShuffles[q.num] = { options, origToDisplay, displayToOrig };
  }
  return questionShuffles[q.num];
}

function isSelectedCorrect(q, displayLetter) {
  const sh = getShuffled(q);
  const origLetter = sh.displayToOrig[displayLetter];
  return q.answers.includes(origLetter);
}

function loadState() {
  try {
    state = JSON.parse(localStorage.getItem(DATA_KEY) || '{}');
  } catch { state = {}; }
}

function saveState() {
  localStorage.setItem(DATA_KEY, JSON.stringify(state));
}

function applyFilters() {
  const m = document.getElementById('mode-select').value;
  mode = m;
  if (m === 'random') {
    filteredQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
  } else if (m === 'unanswered') {
    filteredQuestions = allQuestions.filter(q => !state[q.num]?.selected);
  } else if (m === 'wrong') {
    filteredQuestions = allQuestions.filter(q => {
      const s = state[q.num];
      if (!s?.selected) return false;
      return !isSelectedCorrect(q, s.selected);
    });
  } else {
    filteredQuestions = [...allQuestions];
  }
  currentPage = 1;
}

function getPageQuestions() {
  const start = (currentPage - 1) * perPage;
  return filteredQuestions.slice(start, start + perPage);
}

function totalPages() {
  return Math.max(1, Math.ceil(filteredQuestions.length / perPage));
}

function answeredCount() {
  return allQuestions.filter(q => state[q.num]?.selected).length;
}

function correctCount() {
  return allQuestions.filter(q => {
    const s = state[q.num];
    if (!s?.selected) return false;
    return isSelectedCorrect(q, s.selected);
  }).length;
}

function render() {
  const pageQs = getPageQuestions();
  const container = document.getElementById('questions-container');

  document.getElementById('total-count').textContent =
    `${filteredQuestions.length} questions`;

  const answered = answeredCount();
  const correct = correctCount();
  document.getElementById('score-badge').textContent =
    `Score: ${correct} / ${answered}`;

  const pct = allQuestions.length ? (answered / allQuestions.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';

  const tp = totalPages();
  document.getElementById('page-info').textContent =
    `Page ${currentPage} of ${tp} — showing questions ${(currentPage - 1) * perPage + 1}–${Math.min(currentPage * perPage, filteredQuestions.length)}`;

  if (pageQs.length === 0) {
    container.innerHTML = `<div class="empty-state"><h2>No questions found</h2><p>Try changing the filter or resetting progress.</p></div>`;
    renderPagination();
    return;
  }

  let previousCategory = null;
  container.innerHTML = pageQs.map(q => {
    const showCategory = mode !== 'random' && q.category !== previousCategory;
    previousCategory = q.category;
    const heading = showCategory
      ? `<h2 class="category-heading">${escHtml(q.category)}</h2>`
      : '';
    return heading + renderQuestion(q);
  }).join('');

  container.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qNum = +el.dataset.qnum;
      const letter = el.dataset.letter;
      if (state[qNum]?.selected) return;
      state[qNum] = { ...(state[qNum] || {}), selected: letter };
      saveState();
      renderQuestion_update(qNum);
      updateScoreBadge();
    });
  });

  container.querySelectorAll('.reveal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qNum = +btn.dataset.qnum;
      state[qNum] = { ...(state[qNum] || {}), revealed: true };
      saveState();
      renderQuestion_update(qNum);
    });
  });

  renderPagination();
}

function renderQuestion(q) {
  const s = state[q.num] || {};
  const selected = s.selected;
  const revealed = s.revealed || !!selected;
  const isAnswered = !!selected;
  const sh = getShuffled(q);

  const optionsHtml = sh.options.map(opt => {
    const isCorrectOrig = q.answers.includes(opt.origLetter);
    let cls = 'option';
    if (selected === opt.displayLetter) {
      cls += isCorrectOrig ? ' correct' : ' wrong';
    } else if (revealed && isCorrectOrig) {
      cls += ' correct';
    }
    if (isAnswered || revealed) cls += ' disabled';

    return `<div class="${cls}" data-qnum="${q.num}" data-letter="${opt.displayLetter}">
      <span class="opt-letter">${opt.displayLetter}</span>
      <span>${escHtml(opt.text)}</span>
    </div>`;
  }).join('');

  const answerText = q.answers.map(a => sh.origToDisplay[a] || a).join(', ');
  const answerPanelVisible = revealed ? 'visible' : '';
  const revealBtnHidden = revealed ? 'style="display:none"' : '';

  return `<div class="question-card ${revealed ? 'revealed' : ''}" id="qcard-${q.num}">
    <div class="q-header">
      <span class="q-num">Q${q.num}</span>
      <p class="q-text">${escHtml(q.question)}</p>
    </div>
    <div class="options">${optionsHtml}</div>
    <div class="q-actions">
      <button class="btn btn-ghost reveal-btn" data-qnum="${q.num}" ${revealBtnHidden}>Reveal Answer</button>
      ${!isAnswered && !revealed ? `<span class="reveal-hint">Click an option or reveal</span>` : ''}
    </div>
    <div class="answer-panel ${answerPanelVisible}" id="ans-${q.num}">
      <strong>Correct Answer: ${answerText}</strong>
    </div>
  </div>`;
}

function renderQuestion_update(qNum) {
  const q = allQuestions.find(x => x.num === qNum);
  if (!q) return;
  const card = document.getElementById(`qcard-${qNum}`);
  if (!card) return;
  const newHtml = renderQuestion(q);
  const tmp = document.createElement('div');
  tmp.innerHTML = newHtml;
  const newCard = tmp.firstElementChild;
  card.replaceWith(newCard);

  newCard.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qn = +el.dataset.qnum;
      const letter = el.dataset.letter;
      if (state[qn]?.selected) return;
      state[qn] = { ...(state[qn] || {}), selected: letter };
      saveState();
      renderQuestion_update(qn);
      updateScoreBadge();
    });
  });
  newCard.querySelectorAll('.reveal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qn = +btn.dataset.qnum;
      state[qn] = { ...(state[qn] || {}), revealed: true };
      saveState();
      renderQuestion_update(qn);
    });
  });
}

function updateScoreBadge() {
  const answered = answeredCount();
  const correct = correctCount();
  document.getElementById('score-badge').textContent =
    `Score: ${correct} / ${answered}`;
  const pct = allQuestions.length ? (answered / allQuestions.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderPagination() {
  const tp = totalPages();
  const pag = document.getElementById('pagination');
  if (tp <= 1) { pag.innerHTML = ''; return; }

  const pages = [];
  const addBtn = (label, page, disabled = false, active = false) => {
    pages.push(`<button class="page-btn ${active ? 'active' : ''}"
      ${disabled ? 'disabled' : ''}
      data-page="${page}">${label}</button>`);
  };

  addBtn('&laquo;', currentPage - 1, currentPage === 1);

  const delta = 2;
  let lo = Math.max(1, currentPage - delta);
  let hi = Math.min(tp, currentPage + delta);
  if (lo > 1) { addBtn('1', 1); if (lo > 2) pages.push('<span style="color:var(--muted);padding:0 4px">…</span>'); }
  for (let i = lo; i <= hi; i++) addBtn(i, i, false, i === currentPage);
  if (hi < tp) { if (hi < tp - 1) pages.push('<span style="color:var(--muted);padding:0 4px">…</span>'); addBtn(tp, tp); }

  addBtn('&raquo;', currentPage + 1, currentPage === tp);

  pag.innerHTML = pages.join('') + `
    <div class="jump-to">
      <span>Go to</span>
      <input type="number" id="jump-input" min="1" max="${tp}" placeholder="${currentPage}" />
      <button id="jump-btn">Go</button>
    </div>`;

  pag.querySelectorAll('.page-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = +btn.dataset.page;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      render();
    });
  });

  const jumpInput = document.getElementById('jump-input');
  const jumpBtn = document.getElementById('jump-btn');

  jumpBtn.addEventListener('click', () => jumpToPage(jumpInput.value));
  jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') jumpToPage(e.target.value); });
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('mode-select').addEventListener('change', () => {
  applyFilters();
  render();
});

function jumpToPage(val) {
  const tp = totalPages();
  const page = Math.min(tp, Math.max(1, +val));
  if (!page) return;
  currentPage = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

document.getElementById('jump-top-btn').addEventListener('click', () => {
  jumpToPage(document.getElementById('jump-top').value);
});
document.getElementById('jump-top').addEventListener('keydown', e => {
  if (e.key === 'Enter') jumpToPage(e.target.value);
});

document.getElementById('per-page').addEventListener('change', e => {
  perPage = Math.max(1, Math.min(50, +e.target.value || 10));
  currentPage = 1;
  render();
});

document.getElementById('reveal-all-btn').addEventListener('click', () => {
  getPageQuestions().forEach(q => {
    state[q.num] = { ...(state[q.num] || {}), revealed: true };
  });
  saveState();
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState();
  applyFilters();
  render();
});

loadQuestions();
</script>
